---
name: Test missing source-pattern validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up fake yq on PATH
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/bin"
          cp "$GITHUB_WORKSPACE/tests/fixtures/fake-yq" "$GITHUB_WORKSPACE/tests/fixtures/bin/yq"
          chmod +x "$GITHUB_WORKSPACE/tests/fixtures/bin/yq"
          echo "$GITHUB_WORKSPACE/tests/fixtures/bin" >> "$GITHUB_PATH"

      - name: Run action with empty source-pattern (should fail)
        id: action
        uses: .
        continue-on-error: true
        with:
          source-pattern: ""
          to: json

      - name: Assert action failed due to missing source-pattern
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with empty source-pattern, but got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed with empty source-pattern"
