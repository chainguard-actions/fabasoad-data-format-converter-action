name: Test same format conversion (JSON to JSON)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create input JSON file
        run: |
          cat > /tmp/same.json << 'EOF'
          {"key":"value","number":42}
          EOF

      - id: action
        uses: .
        with:
          input: /tmp/same.json
          from: json
          to: json

      - name: Assert output is not empty
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: output is empty"
            exit 1
          fi
          echo "PASS: output is non-empty"

      - name: Assert output contains expected content
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if ! echo "$ACTUAL" | grep -q "key"; then
            echo "FAIL: output does not contain 'key'"
            exit 1
          fi
          if ! echo "$ACTUAL" | grep -q "value"; then
            echo "FAIL: output does not contain 'value'"
            exit 1
          fi
          echo "PASS: output contains expected content"
