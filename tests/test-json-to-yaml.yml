name: Test JSON to YAML conversion
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create input JSON file
        run: |
          cat > /tmp/input.json << 'EOF'
          {"name":"Alice","age":30,"active":true}
          EOF

      - id: action
        uses: .
        with:
          input: /tmp/input.json
          from: json
          to: yaml

      - name: Assert output is not empty
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: output is empty"
            exit 1
          fi
          echo "PASS: output is non-empty"

      - name: Assert output contains expected YAML keys
        env:
          ACTUAL: ${{ steps.action.outputs.output }}
        run: |
          echo "actual: $ACTUAL"
          if ! echo "$ACTUAL" | grep -q "name:"; then
            echo "FAIL: output does not contain 'name:'"
            exit 1
          fi
          if ! echo "$ACTUAL" | grep -q "age:"; then
            echo "FAIL: output does not contain 'age:'"
            exit 1
          fi
          echo "PASS: output contains expected YAML keys"
