---
name: Test JSON to YAML conversion
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up fake yq on PATH
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/bin"
          cp "$GITHUB_WORKSPACE/tests/fixtures/fake-yq" "$GITHUB_WORKSPACE/tests/fixtures/bin/yq"
          chmod +x "$GITHUB_WORKSPACE/tests/fixtures/bin/yq"
          echo "$GITHUB_WORKSPACE/tests/fixtures/bin" >> "$GITHUB_PATH"
          # Verify fake yq works
          yq --version

      - name: Verify fixture file exists
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/"
          if [ ! -f "$GITHUB_WORKSPACE/tests/fixtures/sample.json" ]; then
            echo "FAIL: fixture file not found"
            exit 1
          fi
          echo "PASS: fixture file exists"

      - name: Run JSON to YAML conversion
        id: action
        uses: .
        with:
          source-pattern: "${{ github.workspace }}/tests/fixtures/sample.json"
          from: json
          to: yaml

      - name: Assert result-path output is set
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "result-path: $RESULT_PATH"
          if [ -z "$RESULT_PATH" ]; then
            echo "FAIL: result-path output is empty"
            exit 1
          fi
          echo "PASS: result-path is set to $RESULT_PATH"

      - name: Assert converted YAML file exists
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "Looking for sample.yaml in: $RESULT_PATH"
          ls -la "$RESULT_PATH" || true
          if [ ! -f "$RESULT_PATH/sample.yaml" ]; then
            echo "FAIL: expected $RESULT_PATH/sample.yaml to exist"
            exit 1
          fi
          echo "PASS: sample.yaml exists"

      - name: Assert YAML content is valid
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "Content of converted file:"
          cat "$RESULT_PATH/sample.yaml"
          if ! python3 -c "import sys; content=open('$RESULT_PATH/sample.yaml').read(); print('ok')" 2>/dev/null; then
            echo "FAIL: could not read converted file"
            exit 1
          fi
          echo "PASS: converted file is readable"

      - name: Assert YAML contains expected key
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          CONTENT=$(cat "$RESULT_PATH/sample.yaml")
          echo "Content: $CONTENT"
          if ! echo "$CONTENT" | grep -q 'name'; then
            echo "FAIL: expected 'name' key in YAML output"
            exit 1
          fi
          echo "PASS: YAML contains expected key"
