name: Test invalid format validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source YAML file
        run: |
          mkdir -p /tmp/test-invalid-format
          cat > /tmp/test-invalid-format/input.yaml << 'EOF'
          s:
            v: "1"
          EOF

      - name: Run action with invalid to-format and capture failure
        id: convert
        uses: .
        continue-on-error: true
        with:
          source-pattern: /tmp/test-invalid-format/input.yaml
          from: yaml
          to: toml
          github-token: dummy-token

      - name: Assert action failed due to invalid format
        env:
          OUTCOME: ${{ steps.convert.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid 'to' format 'toml', but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid format"
