---
name: Test invalid 'to' parameter fails validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test YAML file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-data"
          cat > "$GITHUB_WORKSPACE/test-data/sample.yaml" <<'EOF'
          key: value
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          source-pattern: "${{ github.workspace }}/test-data/sample.yaml"
          from: yaml
          to: toml

      - name: Assert action failed due to invalid 'to' parameter
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid 'to' parameter, but got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid 'to' parameter"
