---
name: Test YAML to JSON conversion
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test YAML file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-data"
          cat > "$GITHUB_WORKSPACE/test-data/sample.yaml" <<'EOF'
          name: Alice
          age: 30
          active: true
          EOF

      - id: action
        uses: .
        with:
          source-pattern: "${{ github.workspace }}/test-data/sample.yaml"
          from: yaml
          to: json

      - name: Assert result-path output is set
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "result-path: $RESULT_PATH"
          if [ -z "$RESULT_PATH" ]; then
            echo "FAIL: result-path output is empty"
            exit 1
          fi
          echo "PASS: result-path is set to $RESULT_PATH"

      - name: Assert converted JSON file exists
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "Checking for sample.json in $RESULT_PATH"
          if [ ! -f "$RESULT_PATH/sample.json" ]; then
            echo "FAIL: expected $RESULT_PATH/sample.json to exist"
            ls -la "$RESULT_PATH" || true
            exit 1
          fi
          echo "PASS: sample.json exists"

      - name: Assert JSON content is valid
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "Content of sample.json:"
          cat "$RESULT_PATH/sample.json"
          # Validate it is parseable JSON
          if ! python3 -c "import json, sys; json.load(open('$RESULT_PATH/sample.json'))" 2>&1; then
            echo "FAIL: sample.json is not valid JSON"
            exit 1
          fi
          echo "PASS: sample.json is valid JSON"
