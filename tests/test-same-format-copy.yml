---
name: Test same format copy (from equals to)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_TEMP: /tmp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up fake yq on PATH
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/bin"
          cp "$GITHUB_WORKSPACE/tests/fixtures/fake-yq" "$GITHUB_WORKSPACE/tests/fixtures/bin/yq"
          chmod +x "$GITHUB_WORKSPACE/tests/fixtures/bin/yq"
          echo "$GITHUB_WORKSPACE/tests/fixtures/bin" >> "$GITHUB_PATH"

      - name: Verify fixture file exists
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/tests/fixtures/"
          if [ ! -f "$GITHUB_WORKSPACE/tests/fixtures/sample.json" ]; then
            echo "FAIL: fixture file not found"
            exit 1
          fi
          echo "PASS: fixture file exists"

      - name: Run conversion with same from and to format
        id: action
        uses: .
        with:
          source-pattern: "${{ github.workspace }}/tests/fixtures/sample.json"
          from: json
          to: json

      - name: Assert result-path output is set
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "result-path: $RESULT_PATH"
          if [ -z "$RESULT_PATH" ]; then
            echo "FAIL: result-path output is empty"
            exit 1
          fi
          echo "PASS: result-path is set to $RESULT_PATH"

      - name: Assert copied JSON file exists
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          echo "Looking for sample.json in: $RESULT_PATH"
          ls -la "$RESULT_PATH" || true
          if [ ! -f "$RESULT_PATH/sample.json" ]; then
            echo "FAIL: expected $RESULT_PATH/sample.json to exist (copied)"
            exit 1
          fi
          echo "PASS: sample.json exists (copied)"

      - name: Assert copied file content matches original
        env:
          RESULT_PATH: ${{ steps.action.outputs.result-path }}
        run: |
          ORIGINAL="${GITHUB_WORKSPACE}/tests/fixtures/sample.json"
          COPIED="$RESULT_PATH/sample.json"
          echo "Original content:"
          cat "$ORIGINAL"
          echo "Copied content:"
          cat "$COPIED"
          if ! python3 -c "import json; a=json.load(open('$ORIGINAL')); b=json.load(open('$COPIED')); assert a==b, 'Content mismatch'" 2>/dev/null; then
            echo "FAIL: copied file content does not match original"
            exit 1
          fi
          echo "PASS: copied file content matches original"
